name: Preview Deploy

on:
  workflow_run:
    workflows: [ PR Checks ]
    types: [ completed ]

concurrency:
  group: preview-deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Preview → Coolify
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Resolve PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          PR_JSON=$(gh api "repos/$REPO/actions/runs/$RUN_ID/pulls" --jq '.[0]')
          echo "number=$(echo "$PR_JSON" | jq -r '.number')"  >> "$GITHUB_OUTPUT"
          echo "sha=$(echo    "$PR_JSON" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"

      # Coolify создаёт отдельное preview-окружение для каждого PR
      # при включённой опции "Preview Deployments" в настройках приложения
      - name: Trigger Coolify preview deployment
        run: |
          curl -fsS \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&pull_request_id=${{ steps.pr.outputs.number }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          COOLIFY_PREVIEW_URL: ${{ secrets.COOLIFY_PREVIEW_URL }}
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
        with:
          script: |
            const prNumber   = Number('${{ steps.pr.outputs.number }}')
            const sha        = '${{ steps.pr.outputs.sha }}'
            const previewUrl = `${process.env.COOLIFY_PREVIEW_URL}`
            const coolifyUrl = process.env.COOLIFY_URL

            const MARKER = '<!-- preview-deploy-bot -->'
            const body = [
              MARKER,
              '## 🚀 Preview deployment',
              '',
              `| | |`,
              `|---|---|`,
              `| **Commit** | [\`${sha.slice(0,7)}\`](${context.payload.repository.html_url}/commit/${sha}) |`,
              `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
              `| **Coolify** | [Dashboard](${coolifyUrl}) |`,
              '',
              '_Обновляется при каждом пуше после прохождения всех проверок._',
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.find(c => c.body?.includes(MARKER))

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
